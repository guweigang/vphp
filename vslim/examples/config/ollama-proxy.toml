[server]
host = "127.0.0.1"
port = 19884

[files]
pid_file = "/tmp/vhttpd_ollama_proxy.pid"
event_log = "/tmp/vhttpd_ollama_proxy.events.ndjson"

[worker]
autostart = true
read_timeout_ms = 60000
socket = "/tmp/vslim_ollama_proxy.sock"
cmd = "php -d extension=/Users/guweigang/Source/vphpext/vslim/vslim.so /Users/guweigang/Source/vphpext/vslim/httpd/php-worker.php"

[worker.env]
VSLIM_HTTPD_APP = "/Users/guweigang/Source/vphpext/vslim/examples/ollama-proxy-app.php"
OLLAMA_CHAT_URL = "http://localhost:11434/api/chat"
OLLAMA_MODEL = "qwen2.5:7b-instruct"
OLLAMA_API_KEY = ""

[admin]
host = "127.0.0.1"
port = 19984
token = ""
