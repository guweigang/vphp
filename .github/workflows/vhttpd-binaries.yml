name: Build vhttpd binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to publish release assets (example: vhttpd-0.1.0)"
        required: false
        type: string
  push:
    branches: [main]
    tags:
      - 'vhttpd-*'
      - 'v*'
    paths:
      - 'vhttpd/**'
      - 'vslim/**'
      - 'vphp/**'
      - '.github/workflows/vhttpd-binaries.yml'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            archive: tar.gz
          - os: macos-15-intel
            target: macos-amd64
            archive: tar.gz
          - os: macos-15
            target: macos-arm64
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install build deps (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcjson-dev

      - name: Install build deps (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          brew install cjson

      - name: Install V compiler
        shell: bash
        run: |
          git clone --depth=1 https://github.com/vlang/v /tmp/v
          make -C /tmp/v
          echo "/tmp/v" >> "$GITHUB_PATH"

      - name: Build vhttpd and vslim.so
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          v version
          v -prod -o dist/vhttpd ./vhttpd/src
          ./dist/vhttpd --help >/dev/null || true

          PHP_INC="$(php-config --includes)"
          PHP_LDFLAGS="$(php-config --ldflags)"
          PHP_LIBS="$(php-config --libs | sed 's/-lzip//g')"
          COMMON_WARN="-Wno-pointer-to-int-cast -Wno-incompatible-pointer-types -Wno-initializer-overrides"

          if [[ "${{ matrix.target }}" == linux-* ]]; then
            gcc -shared -fPIC ${COMMON_WARN} -DCOMPILE_DL_VSLIM=1 \
              -DcJSON_GetErrorPos=cJSON_GetErrorPtr \
              ${PHP_INC} \
              ./vslim/vphp_ext_vslim.c ./vslim/php_bridge.c ./vphp/v_bridge.c \
              -o dist/vslim.so \
              -I./vphp \
              ${PHP_LDFLAGS} ${PHP_LIBS} \
              -lcjson -fvisibility=default
          else
            gcc -shared -fPIC ${COMMON_WARN} -DCOMPILE_DL_VSLIM=1 \
              -I/opt/homebrew/include -L/opt/homebrew/lib -lcjson \
              -I/usr/local/include -L/usr/local/lib \
              -DcJSON_GetErrorPos=cJSON_GetErrorPtr \
              ${PHP_INC} \
              ./vslim/vphp_ext_vslim.c ./vslim/php_bridge.c ./vphp/v_bridge.c \
              -o dist/vslim.so \
              -I./vphp \
              ${PHP_LDFLAGS} ${PHP_LIBS} \
              -undefined dynamic_lookup -fvisibility=default
          fi

      - name: Smoke tests
        shell: bash
        run: |
          set -euo pipefail
          php -d extension="$(pwd)/dist/vslim.so" -r 'if (!extension_loaded("vslim")) { fwrite(STDERR, "vslim extension not loaded\n"); exit(1);} echo "vslim extension loaded\n";'
          ./dist/vhttpd --help >/dev/null
          if ./dist/vhttpd -1 >/dev/null 2>&1; then
            echo "expected unknown option to fail"
            exit 1
          fi

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          bundle="vhttpd-${{ matrix.target }}"
          mkdir -p "$bundle"
          cp dist/vhttpd "$bundle/"
          cp dist/vslim.so "$bundle/"
          cp vhttpd/README.md "$bundle/README.md"
          tar -czf "$bundle.tar.gz" "$bundle"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhttpd-${{ matrix.target }}
          path: vhttpd-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          TAG_INPUT="${{ github.event.inputs.release_tag }}"
          if [[ -n "${TAG_INPUT}" ]]; then
            echo "tag=${TAG_INPUT}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-artifacts -type f -name '*.tar.gz' -print0 | sort -z | xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt
          cat > release-artifacts/RELEASE_HEADER.md <<'NOTES'
          ## Release assets

          This release publishes prebuilt artifacts for:
          - linux-amd64
          - macos-amd64
          - macos-arm64

          Each tarball includes:
          - `vhttpd`
          - `vslim.so`

          Check `SHA256SUMS.txt` to verify downloads.
          NOTES

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: vhttpd ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          body_path: release-artifacts/RELEASE_HEADER.md
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/SHA256SUMS.txt
