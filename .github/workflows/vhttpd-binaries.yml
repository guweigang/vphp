name: Build vhttpd binaries

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'vhttpd-*'
      - 'v*'
    paths:
      - 'vhttpd/**'
      - '.github/workflows/vhttpd-binaries.yml'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            archive: tar.gz
          - os: macos-13
            target: macos-amd64
            archive: tar.gz
          - os: macos-14
            target: macos-arm64
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install V compiler
        shell: bash
        run: |
          git clone --depth=1 https://github.com/vlang/v /tmp/v
          make -C /tmp/v
          echo "/tmp/v" >> "$GITHUB_PATH"

      - name: Build vhttpd
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          v version
          v -prod -o dist/vhttpd ./vhttpd/src
          ./dist/vhttpd --help >/dev/null || true

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          bundle="vhttpd-${{ matrix.target }}"
          mkdir -p "$bundle"
          cp dist/vhttpd "$bundle/"
          cp vhttpd/README.md "$bundle/README.md"
          tar -czf "$bundle.tar.gz" "$bundle"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vhttpd-${{ matrix.target }}
          path: vhttpd-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-artifacts -type f -name '*.tar.gz' -print0 | sort -z | xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/SHA256SUMS.txt
